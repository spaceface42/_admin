<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitCMS — Fragment Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0a0f;
    --surface:  #111118;
    --panel:    #16161f;
    --border:   #252535;
    --accent:   #5b6af5;
    --accent2:  #a78bfa;
    --green:    #34d399;
    --red:      #f87171;
    --amber:    #fbbf24;
    --text:     #e2e8f0;
    --muted:    #64748b;
    --mono:     'JetBrains Mono', monospace;
    --sans:     'Syne', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── GRID NOISE BACKGROUND ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 39px, var(--border) 39px, var(--border) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, var(--border) 39px, var(--border) 40px);
    opacity: 0.18;
    pointer-events: none;
    z-index: 0;
  }

  /* ── LOGIN SCREEN ── */
  #login-screen {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    background: var(--bg);
  }

  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 3rem 2.5rem;
    width: min(440px, 94vw);
    position: relative;
    animation: slideUp 0.5s cubic-bezier(.16,1,.3,1);
  }

  .login-card::before {
    content: '';
    position: absolute;
    top: -1px; left: 2rem; right: 2rem; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
  }

  .login-logo {
    font-size: 1.1rem;
    font-weight: 800;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text);
    margin-bottom: 0.4rem;
  }
  .login-logo span { color: var(--accent); }

  .login-sub {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--muted);
    margin-bottom: 2.4rem;
  }

  .field-group { margin-bottom: 1.2rem; }
  .field-group label {
    display: block;
    font-family: var(--mono);
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  .field-group input {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.82rem;
    padding: 0.75rem 1rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .field-group input:focus { border-color: var(--accent); }
  .field-group input::placeholder { color: var(--muted); opacity: 0.5; }

  .repo-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }

  .btn-login {
    width: 100%;
    margin-top: 1.6rem;
    padding: 0.85rem;
    background: var(--accent);
    color: #fff;
    font-family: var(--sans);
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border: none;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
  }
  .btn-login:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn-login:active { transform: translateY(0); }
  .btn-login:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  #login-error {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--red);
    margin-top: 1rem;
    min-height: 1rem;
  }

  /* ── MAIN APP ── */
  #app { display: none; min-height: 100vh; position: relative; z-index: 1; }
  #app.visible { display: flex; flex-direction: column; }

  /* ── TOPBAR ── */
  .topbar {
    height: 56px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 1.5rem;
    position: sticky; top: 0; z-index: 50;
  }

  .topbar-left { display: flex; align-items: center; gap: 1.2rem; }
  .topbar-logo { font-size: 0.9rem; font-weight: 800; letter-spacing: 0.12em; }
  .topbar-logo span { color: var(--accent); }

  .repo-badge {
    font-family: var(--mono);
    font-size: 0.68rem;
    color: var(--muted);
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 0.25rem 0.6rem;
    display: flex; align-items: center; gap: 0.4rem;
  }
  .repo-badge .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }

  .topbar-right { display: flex; align-items: center; gap: 0.8rem; }

  .btn-sm {
    font-family: var(--mono);
    font-size: 0.7rem;
    padding: 0.4rem 0.9rem;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.15s;
  }
  .btn-sm:hover { border-color: var(--accent); color: var(--accent); }

  .btn-sm.danger:hover { border-color: var(--red); color: var(--red); }

  /* ── LAYOUT ── */
  .workspace {
    display: grid;
    grid-template-columns: 280px 1fr;
    flex: 1;
    height: calc(100vh - 56px);
  }

  /* ── SIDEBAR ── */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 1rem 1.2rem 0.8rem;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .sidebar-title {
    font-family: var(--mono);
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
  }

  .btn-refresh {
    background: none; border: none;
    color: var(--muted); cursor: pointer;
    font-size: 0.9rem;
    transition: color 0.15s, transform 0.3s;
    padding: 0.2rem;
  }
  .btn-refresh:hover { color: var(--accent); }
  .btn-refresh.spinning { animation: spin 1s linear infinite; }

  .fragment-list {
    flex: 1; overflow-y: auto;
    padding: 0.5rem 0;
  }
  .fragment-list::-webkit-scrollbar { width: 4px; }
  .fragment-list::-webkit-scrollbar-track { background: transparent; }
  .fragment-list::-webkit-scrollbar-thumb { background: var(--border); }

  .fragment-item {
    padding: 0.7rem 1.2rem;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: all 0.15s;
    display: flex; align-items: center; gap: 0.75rem;
  }
  .fragment-item:hover { background: var(--panel); }
  .fragment-item.active {
    background: var(--panel);
    border-left-color: var(--accent);
  }

  .frag-icon {
    width: 28px; height: 28px;
    background: var(--panel);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--accent);
    flex-shrink: 0;
  }
  .fragment-item.active .frag-icon {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .frag-info { flex: 1; min-width: 0; }
  .frag-id {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .frag-file {
    font-family: var(--mono);
    font-size: 0.62rem;
    color: var(--muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .frag-modified {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--amber);
    flex-shrink: 0;
    display: none;
  }
  .frag-modified.show { display: block; }

  .sidebar-empty {
    padding: 2rem 1.2rem;
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--muted);
    text-align: center;
    line-height: 1.6;
  }

  /* ── EDITOR AREA ── */
  .editor-area {
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  .editor-topbar {
    padding: 0.8rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface);
    min-height: 52px;
  }

  .editor-breadcrumb {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--muted);
    display: flex; align-items: center; gap: 0.4rem;
  }
  .breadcrumb-sep { color: var(--border); }
  .breadcrumb-active { color: var(--text); }

  .editor-actions { display: flex; gap: 0.6rem; align-items: center; }

  .btn-save {
    font-family: var(--sans);
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    padding: 0.45rem 1.1rem;
    background: var(--accent);
    color: #fff;
    border: none;
    cursor: pointer;
    text-transform: uppercase;
    transition: opacity 0.2s, transform 0.15s;
  }
  .btn-save:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn-save:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  #status-msg {
    font-family: var(--mono);
    font-size: 0.68rem;
    padding: 0.3rem 0.7rem;
    transition: opacity 0.3s;
  }
  #status-msg.ok { color: var(--green); }
  #status-msg.err { color: var(--red); }
  #status-msg.saving { color: var(--amber); }

  .editor-panels {
    display: grid;
    grid-template-columns: 1fr 1fr;
    flex: 1;
    overflow: hidden;
  }

  .editor-pane {
    display: flex; flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  .editor-pane + .editor-pane {
    border-left: 1px solid var(--border);
  }

  .pane-label {
    padding: 0.45rem 1rem;
    font-family: var(--mono);
    font-size: 0.63rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 0.5rem;
  }
  .pane-label .dot-label {
    width: 5px; height: 5px; border-radius: 50%;
  }
  .dot-html { background: var(--accent); }
  .dot-preview { background: var(--green); }

  textarea#html-editor {
    flex: 1;
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.78rem;
    line-height: 1.7;
    padding: 1.2rem;
    border: none;
    outline: none;
    resize: none;
    tab-size: 2;
  }

  #preview-frame {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem;
    background: #fff;
  }

  #empty-state {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    gap: 1rem;
    color: var(--muted);
  }
  #empty-state .empty-icon {
    font-size: 2.5rem;
    opacity: 0.3;
  }
  #empty-state p {
    font-family: var(--mono);
    font-size: 0.78rem;
    opacity: 0.5;
  }

  /* ── STATUS BAR ── */
  .statusbar {
    height: 28px;
    background: var(--accent);
    display: flex; align-items: center;
    padding: 0 1.5rem;
    gap: 1.5rem;
    font-family: var(--mono);
    font-size: 0.63rem;
    color: rgba(255,255,255,0.75);
  }
  .statusbar span { display: flex; align-items: center; gap: 0.3rem; }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 2rem; right: 2rem;
    padding: 0.75rem 1.2rem;
    background: var(--surface);
    border: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--text);
    z-index: 999;
    transform: translateY(20px);
    opacity: 0;
    transition: all 0.3s cubic-bezier(.16,1,.3,1);
    pointer-events: none;
    max-width: 320px;
  }
  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.toast-ok { border-left: 3px solid var(--green); }
  #toast.toast-err { border-left: 3px solid var(--red); }

  /* ── LOADING OVERLAY ── */
  #loading-overlay {
    position: fixed; inset: 0;
    background: rgba(10,10,15,0.8);
    display: none; align-items: center; justify-content: center;
    z-index: 200;
    backdrop-filter: blur(4px);
  }
  #loading-overlay.show { display: flex; }
  .loader-text {
    font-family: var(--mono);
    font-size: 0.8rem;
    color: var(--muted);
    display: flex; align-items: center; gap: 0.8rem;
  }
  .loader-dots span {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: bounce 1.2s infinite;
    margin: 0 2px;
  }
  .loader-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loader-dots span:nth-child(3) { animation-delay: 0.4s; }

  /* ── COMMIT MODAL ── */
  #commit-modal {
    display: none;
    position: fixed; inset: 0;
    background: rgba(10,10,15,0.85);
    z-index: 300;
    align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
  }
  #commit-modal.show { display: flex; }
  .modal-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 2rem;
    width: min(420px, 92vw);
    position: relative;
  }
  .modal-card::before {
    content: '';
    position: absolute;
    top: -1px; left: 1.5rem; right: 1.5rem; height: 2px;
    background: linear-gradient(90deg, transparent, var(--amber), transparent);
  }
  .modal-title {
    font-size: 0.95rem;
    font-weight: 700;
    margin-bottom: 0.3rem;
  }
  .modal-sub {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--muted);
    margin-bottom: 1.5rem;
  }
  .modal-card textarea {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.78rem;
    padding: 0.75rem 1rem;
    outline: none;
    resize: vertical;
    min-height: 80px;
    transition: border-color 0.2s;
  }
  .modal-card textarea:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 0.7rem; margin-top: 1.2rem; justify-content: flex-end; }
  .btn-cancel {
    font-family: var(--mono);
    font-size: 0.72rem;
    padding: 0.5rem 1rem;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-cancel:hover { border-color: var(--red); color: var(--red); }
  .btn-commit {
    font-family: var(--sans);
    font-size: 0.75rem;
    font-weight: 700;
    padding: 0.5rem 1.2rem;
    background: var(--green);
    color: #0a0a0f;
    border: none;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    transition: opacity 0.2s;
  }
  .btn-commit:hover { opacity: 0.85; }
  .btn-commit:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── ANIMATIONS ── */
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.4; }
  }
  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); }
    40%            { transform: scale(1); }
  }

  /* ── SCROLLBAR ── */
  textarea::-webkit-scrollbar { width: 4px; }
  textarea::-webkit-scrollbar-track { background: transparent; }
  textarea::-webkit-scrollbar-thumb { background: var(--border); }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">Git<span>CMS</span></div>
    <div class="login-sub">// github-backed fragment editor</div>

    <div class="field-group">
      <label>Admin Repository URL</label>
      <input id="admin-repo" type="text" placeholder="https://github.com/user/repo-admin" autocomplete="off" />
    </div>
    <div class="field-group">
      <label>Site Repository URL</label>
      <input id="site-repo" type="text" placeholder="https://github.com/user/repo-site" autocomplete="off" />
    </div>
    <div class="field-group">
      <label>GitHub Personal Access Token</label>
      <input id="git-token" type="password" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" autocomplete="off" />
    </div>

    <button class="btn-login" id="btn-login" onclick="doLogin()">Connect</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">Git<span>CMS</span></div>
      <div class="repo-badge">
        <span class="dot"></span>
        <span id="topbar-repo">—</span>
      </div>
    </div>
    <div class="topbar-right">
      <span id="status-msg"></span>
      <button class="btn-sm" onclick="refreshFragments()">↻ Refresh</button>
      <button class="btn-sm danger" onclick="doLogout()">Disconnect</button>
    </div>
  </div>

  <div class="workspace">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">Fragments</span>
        <button class="btn-refresh" id="refresh-btn" onclick="refreshFragments()" title="Refresh">↻</button>
      </div>
      <div class="fragment-list" id="fragment-list">
        <div class="sidebar-empty">Scanning repository<br>for fragments…</div>
      </div>
    </div>

    <!-- EDITOR AREA -->
    <div class="editor-area" id="editor-area">
      <!-- EDITOR TOP -->
      <div class="editor-topbar">
        <div class="editor-breadcrumb" id="editor-breadcrumb">
          <span>site-repo</span>
          <span class="breadcrumb-sep">›</span>
          <span class="breadcrumb-active">select a fragment</span>
        </div>
        <div class="editor-actions">
          <button class="btn-sm" onclick="resetEdits()">Reset</button>
          <button class="btn-save" id="btn-save" onclick="openCommitModal()" disabled>Save & Commit</button>
        </div>
      </div>

      <!-- EDITOR PANELS -->
      <div id="editor-panels" class="editor-panels" style="display:none">
        <div class="editor-pane">
          <div class="pane-label">
            <span class="dot-label dot-html"></span>
            HTML Source
          </div>
          <textarea id="html-editor" spellcheck="false" placeholder='<section id="01" class="fragment">
  <!-- edit your html here -->
</section>'
            oninput="onEditorInput()"></textarea>
        </div>
        <div class="editor-pane">
          <div class="pane-label">
            <span class="dot-label dot-preview"></span>
            Live Preview
          </div>
          <div id="preview-frame"></div>
        </div>
      </div>

      <div id="empty-state">
        <div class="empty-icon">⬡</div>
        <p>No fragment selected</p>
      </div>
    </div>
  </div>

  <div class="statusbar">
    <span>⬡ GitCMS v1.0</span>
    <span id="bar-fragments">0 fragments</span>
    <span id="bar-file">—</span>
    <span id="bar-modified"></span>
  </div>
</div>

<!-- COMMIT MODAL -->
<div id="commit-modal">
  <div class="modal-card">
    <div class="modal-title">Commit Changes</div>
    <div class="modal-sub">Enter a commit message for this fragment update</div>
    <textarea id="commit-msg" placeholder="cms: update fragment #01"></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeCommitModal()">Cancel</button>
      <button class="btn-commit" id="btn-commit-confirm" onclick="commitChanges()">Commit → Push</button>
    </div>
  </div>
</div>

<!-- LOADING -->
<div id="loading-overlay">
  <div class="loader-text">
    <div class="loader-dots">
      <span></span><span></span><span></span>
    </div>
    <span id="loading-msg">Fetching fragments…</span>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
const state = {
  adminRepo: null,
  siteRepo:  null,
  token:     null,
  fragments: [],        // { id, file, path, content, sha, original }
  active:    null,
  dirty:     false,
};

// ─────────────────────────────────────────────
//  GITHUB API HELPERS
// ─────────────────────────────────────────────
function parseRepo(url) {
  // accepts https://github.com/owner/repo or owner/repo
  const m = url.match(/github\.com[:/]([^/]+)\/([^/.\s]+)/);
  if (m) return { owner: m[1], repo: m[2].replace(/\.git$/, '') };
  const s = url.trim().split('/');
  if (s.length === 2) return { owner: s[0], repo: s[1] };
  return null;
}

function ghFetch(path, opts = {}) {
  return fetch(`https://api.github.com${path}`, {
    ...opts,
    headers: {
      'Authorization': `token ${state.token}`,
      'Accept': 'application/vnd.github.v3+json',
      'Content-Type': 'application/json',
      ...(opts.headers || {}),
    },
  });
}

async function getRepoTree(owner, repo) {
  // Get default branch first
  const r = await ghFetch(`/repos/${owner}/${repo}`);
  if (!r.ok) throw new Error(`Cannot access repo ${owner}/${repo}: ${r.status}`);
  const meta = await r.json();
  const branch = meta.default_branch || 'main';

  const t = await ghFetch(`/repos/${owner}/${repo}/git/trees/${branch}?recursive=1`);
  if (!t.ok) throw new Error(`Cannot read tree: ${t.status}`);
  const tree = await t.json();
  return { branch, files: tree.tree.filter(f => f.type === 'blob' && f.path.endsWith('.html')) };
}

async function getFileContent(owner, repo, filePath) {
  const r = await ghFetch(`/repos/${owner}/${repo}/contents/${filePath}`);
  if (!r.ok) throw new Error(`Cannot fetch file: ${r.status}`);
  const data = await r.json();
  return {
    content: atob(data.content.replace(/\n/g, '')),
    sha: data.sha,
  };
}

async function updateFile(owner, repo, branch, filePath, content, sha, message) {
  const r = await ghFetch(`/repos/${owner}/${repo}/contents/${filePath}`, {
    method: 'PUT',
    body: JSON.stringify({
      message,
      content: btoa(unescape(encodeURIComponent(content))),
      sha,
      branch,
    }),
  });
  if (!r.ok) {
    const err = await r.json();
    throw new Error(err.message || `Commit failed: ${r.status}`);
  }
  return r.json();
}

// ─────────────────────────────────────────────
//  FRAGMENT PARSER
// ─────────────────────────────────────────────
function parseFragments(html, filePath) {
  const re = /<section\s[^>]*id="([^"]+)"[^>]*class="[^"]*fragment[^"]*"[^>]*>[\s\S]*?<\/section>/gi;
  const frags = [];
  let m;
  while ((m = re.exec(html)) !== null) {
    frags.push({
      id:       m[1],
      file:     filePath.split('/').pop(),
      path:     filePath,
      content:  m[0],
      original: m[0],
      sha:      null,
      fileContent: html,
    });
  }
  return frags;
}

function replaceFragmentInFile(fileContent, fragId, newFragHtml) {
  const re = new RegExp(
    `<section\\s[^>]*id="${fragId}"[^>]*class="[^"]*fragment[^"]*"[^>]*>[\\s\\S]*?<\\/section>`,
    'i'
  );
  return fileContent.replace(re, newFragHtml);
}

// ─────────────────────────────────────────────
//  FETCH ALL FRAGMENTS (real-time with promises)
// ─────────────────────────────────────────────
async function fetchFragments() {
  const { owner, repo } = parseRepo(state.siteRepo);
  setLoading(true, 'Scanning repository…');

  const { branch, files } = await getRepoTree(owner, repo);
  state.branch = branch;

  if (files.length === 0) {
    setLoading(false);
    renderFragmentList([]);
    return;
  }

  // Fetch ALL html files in parallel with promises
  const filePromises = files.map(file =>
    getFileContent(owner, repo, file.path)
      .then(({ content, sha }) => ({ path: file.path, content, sha }))
      .catch(err => ({ path: file.path, error: err.message }))
  );

  setLoading(true, `Fetching ${files.length} file(s)…`);
  const results = await Promise.all(filePromises);

  const allFragments = [];
  for (const result of results) {
    if (result.error) continue;
    const frags = parseFragments(result.content, result.path);
    frags.forEach(f => {
      f.sha = result.sha;
      f.fileContent = result.content;
    });
    allFragments.push(...frags);
  }

  state.fragments = allFragments;
  renderFragmentList(allFragments);
  setLoading(false);
  setBar('bar-fragments', `${allFragments.length} fragment(s)`);
}

// ─────────────────────────────────────────────
//  RENDER SIDEBAR LIST
// ─────────────────────────────────────────────
function renderFragmentList(frags) {
  const list = document.getElementById('fragment-list');
  if (frags.length === 0) {
    list.innerHTML = `<div class="sidebar-empty">No <code>&lt;section class="fragment"&gt;</code> found in any .html file.</div>`;
    return;
  }
  list.innerHTML = frags.map((f, i) => `
    <div class="fragment-item ${state.active === i ? 'active' : ''}" onclick="selectFragment(${i})">
      <div class="frag-icon">${f.id}</div>
      <div class="frag-info">
        <div class="frag-id">#${f.id}</div>
        <div class="frag-file">${f.file}</div>
      </div>
      <div class="frag-modified ${f.dirty ? 'show' : ''}" title="Unsaved changes"></div>
    </div>
  `).join('');
}

// ─────────────────────────────────────────────
//  SELECT FRAGMENT
// ─────────────────────────────────────────────
function selectFragment(i) {
  state.active = i;
  const f = state.fragments[i];

  document.getElementById('editor-panels').style.display = 'grid';
  document.getElementById('empty-state').style.display   = 'none';

  document.getElementById('html-editor').value = f.content;
  updatePreview(f.content);

  document.getElementById('editor-breadcrumb').innerHTML = `
    <span>${state.siteRepo.split('/').slice(-1)[0] || 'site-repo'}</span>
    <span class="breadcrumb-sep">›</span>
    <span>${f.file}</span>
    <span class="breadcrumb-sep">›</span>
    <span class="breadcrumb-active">#${f.id}</span>
  `;

  setBar('bar-file', f.path);
  setBar('bar-modified', f.dirty ? '● unsaved' : '');
  document.getElementById('btn-save').disabled = !f.dirty;

  renderFragmentList(state.fragments);
}

// ─────────────────────────────────────────────
//  EDITOR INPUT
// ─────────────────────────────────────────────
function onEditorInput() {
  const val = document.getElementById('html-editor').value;
  updatePreview(val);

  if (state.active !== null) {
    const f = state.fragments[state.active];
    f.content = val;
    f.dirty = (val !== f.original);
    document.getElementById('btn-save').disabled = !f.dirty;
    setBar('bar-modified', f.dirty ? '● unsaved' : '');
    renderFragmentList(state.fragments);
  }
}

function updatePreview(html) {
  document.getElementById('preview-frame').innerHTML = html;
}

function resetEdits() {
  if (state.active === null) return;
  const f = state.fragments[state.active];
  f.content = f.original;
  f.dirty = false;
  document.getElementById('html-editor').value = f.original;
  updatePreview(f.original);
  document.getElementById('btn-save').disabled = true;
  setBar('bar-modified', '');
  renderFragmentList(state.fragments);
}

// ─────────────────────────────────────────────
//  COMMIT MODAL
// ─────────────────────────────────────────────
function openCommitModal() {
  if (state.active === null) return;
  const f = state.fragments[state.active];
  document.getElementById('commit-msg').value = `cms: update fragment #${f.id}`;
  document.getElementById('commit-modal').classList.add('show');
  setTimeout(() => document.getElementById('commit-msg').focus(), 100);
}
function closeCommitModal() {
  document.getElementById('commit-modal').classList.remove('show');
}

async function commitChanges() {
  const msg = document.getElementById('commit-msg').value.trim();
  if (!msg) { toast('Please enter a commit message.', 'err'); return; }

  const f = state.fragments[state.active];
  const { owner, repo } = parseRepo(state.siteRepo);

  document.getElementById('btn-commit-confirm').disabled = true;
  setStatus('Committing…', 'saving');
  closeCommitModal();
  setLoading(true, 'Pushing to GitHub…');

  try {
    // Rebuild the full file with updated fragment
    const updatedFile = replaceFragmentInFile(f.fileContent, f.id, f.content);

    const result = await updateFile(owner, repo, state.branch, f.path, updatedFile, f.sha, msg);

    // Update local state
    f.original   = f.content;
    f.fileContent = updatedFile;
    f.sha        = result.content.sha;
    f.dirty      = false;

    // Also update sha for other fragments in the same file
    state.fragments.forEach(fr => {
      if (fr.path === f.path && fr !== f) {
        fr.sha = result.content.sha;
        fr.fileContent = updatedFile;
      }
    });

    setStatus('Committed ✓', 'ok');
    setBar('bar-modified', '');
    document.getElementById('btn-save').disabled = true;
    renderFragmentList(state.fragments);
    toast(`Fragment #${f.id} committed successfully.`, 'ok');
    setTimeout(() => setStatus('', ''), 3000);
  } catch (err) {
    setStatus('Error', 'err');
    toast(`Commit failed: ${err.message}`, 'err');
  } finally {
    setLoading(false);
    document.getElementById('btn-commit-confirm').disabled = false;
  }
}

// ─────────────────────────────────────────────
//  LOGIN / LOGOUT
// ─────────────────────────────────────────────
async function doLogin() {
  const adminUrl = document.getElementById('admin-repo').value.trim();
  const siteUrl  = document.getElementById('site-repo').value.trim();
  const token    = document.getElementById('git-token').value.trim();
  const errEl    = document.getElementById('login-error');
  const btn      = document.getElementById('btn-login');

  errEl.textContent = '';

  if (!siteUrl || !token) {
    errEl.textContent = '✗ Site repo URL and token are required.';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Connecting…';

  // Validate token & repo access
  try {
    const parsed = parseRepo(siteUrl);
    if (!parsed) throw new Error('Invalid site repo URL format.');

    const r = await fetch(`https://api.github.com/repos/${parsed.owner}/${parsed.repo}`, {
      headers: { 'Authorization': `token ${token}` }
    });
    if (r.status === 401) throw new Error('Invalid token or insufficient permissions.');
    if (r.status === 404) throw new Error('Repository not found. Check the URL and token scope.');
    if (!r.ok) throw new Error(`GitHub API error: ${r.status}`);

    state.adminRepo = adminUrl || siteUrl;
    state.siteRepo  = siteUrl;
    state.token     = token;

    const repoData = await r.json();
    document.getElementById('topbar-repo').textContent = repoData.full_name;

    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').classList.add('visible');

    fetchFragments();
  } catch (err) {
    errEl.textContent = `✗ ${err.message}`;
    btn.disabled = false;
    btn.textContent = 'Connect';
  }
}

function doLogout() {
  state.adminRepo = null;
  state.siteRepo  = null;
  state.token     = null;
  state.fragments = [];
  state.active    = null;

  document.getElementById('app').classList.remove('visible');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('btn-login').disabled = false;
  document.getElementById('btn-login').textContent = 'Connect';
  document.getElementById('login-error').textContent = '';
  document.getElementById('fragment-list').innerHTML = '<div class="sidebar-empty">Scanning repository<br>for fragments…</div>';
  document.getElementById('editor-panels').style.display = 'none';
  document.getElementById('empty-state').style.display   = 'flex';
}

async function refreshFragments() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  try { await fetchFragments(); } finally { btn.classList.remove('spinning'); }
}

// ─────────────────────────────────────────────
//  UI HELPERS
// ─────────────────────────────────────────────
function setLoading(show, msg = '') {
  document.getElementById('loading-overlay').classList.toggle('show', show);
  if (msg) document.getElementById('loading-msg').textContent = msg;
}

function setStatus(msg, type = '') {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  el.className = type ? `${type}` : '';
  // set id back
  el.id = 'status-msg';
  el.style.opacity = msg ? '1' : '0';
}

function setBar(id, val) {
  const el = document.getElementById(id);
  if (el) el.textContent = val;
}

let toastTimer;
function toast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show toast-${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3500);
}

// Enter to submit login
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') {
    doLogin();
  }
});
</script>
