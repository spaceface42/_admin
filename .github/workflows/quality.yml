name: GitCMS Quality

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Update npm
        run: npm install -g npm@10.8.2

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify docs index output
        run: test -s docs/index.html

      - name: Syntax check
        run: npm run check

      - name: Test
        run: npm test

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint
